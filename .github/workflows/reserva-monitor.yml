name: RESERVA Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Force a one-off test alert notification path"
        required: false
        default: false
        type: boolean

concurrency:
  group: reserva-monitor
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        run: npm run monitor

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reserva-monitor-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error

      - name: Evaluate result
        id: evaluate
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('artifacts/reserva-monitor.json', 'utf8'));
          const forcedTestAlert = process.env.FORCED_TEST_ALERT === 'true';
          const anyAvailable = result.anyAvailable ? 'true' : 'false';
          const pageState = result.pageState || 'error';
          const shouldAlert = result.anyAvailable || forcedTestAlert ? 'true' : 'false';
          const alertMode = forcedTestAlert ? 'test' : 'availability';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `any_available=${anyAvailable}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `page_state=${pageState}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_alert=${shouldAlert}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `alert_mode=${alertMode}\n`);
          NODE
        env:
          FORCED_TEST_ALERT: ${{ github.event_name == 'workflow_dispatch' && inputs.test_alert }}

      - name: Look for existing alert issue
        id: existing_issue
        if: steps.evaluate.outputs.should_alert == 'true' && steps.evaluate.outputs.alert_mode == 'availability'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const targetTitle = 'RESERVA alert: target date became available';
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === targetTitle);
            core.setOutput('issue_number', existing ? String(existing.number) : '');

      - name: Create alert issue
        id: create_issue
        if: steps.evaluate.outputs.should_alert == 'true' && (steps.evaluate.outputs.alert_mode == 'test' || steps.existing_issue.outputs.issue_number == '')
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');
            const result = JSON.parse(fs.readFileSync('artifacts/reserva-monitor.json', 'utf8'));
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const alertMode = process.env.ALERT_MODE;
            const isTest = alertMode === 'test';
            const lines = [
              isTest ? '# RESERVA notification test' : '# RESERVA target date became available',
              '',
              isTest
                ? '@Kazuki1222-tech GitHub Actions notification path test was triggered.'
                : '@Kazuki1222-tech target date availability was detected.',
              '',
              `- checkedAt: ${result.checkedAt}`,
              `- run: ${runUrl}`,
              `- alertMode: ${alertMode}`,
              '',
              '## Target dates',
            ];
            for (const [id, status] of Object.entries(result.targetDates || {})) {
              lines.push(`- ${id}: ${status.summary}`);
            }
            if ((result.notes || []).length > 0) {
              lines.push('', '## Notes');
              for (const note of result.notes) {
                lines.push(`- ${note}`);
              }
            }
            const issue = await github.rest.issues.create({
              owner,
              repo,
              title: isTest
                ? `RESERVA test alert: notification path check (${context.runId})`
                : 'RESERVA alert: target date became available',
              body: lines.join('\n'),
            });
            core.setOutput('issue_number', String(issue.data.number));
        env:
          ALERT_MODE: ${{ steps.evaluate.outputs.alert_mode }}

      - name: Report alert creation
        if: steps.create_issue.outputs.issue_number != ''
        run: |
          echo "Alert mode: ${{ steps.evaluate.outputs.alert_mode }}. Alert issue #${{ steps.create_issue.outputs.issue_number }} created."
